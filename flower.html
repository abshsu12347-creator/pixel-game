<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YJG花园 — 北京顶级花园植物定制</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:          #1a2e1a;
  --bg-deep:     #0f1f0f;
  --bg-card:     #152314;
  --bg-card-h:   #1d2e1b;
  --gold:        #c9a84c;
  --gold-lt:     #dfc070;
  --gold-dim:    rgba(201,168,76,.45);
  --gold-faint:  rgba(201,168,76,.1);
  --text:        #e8dfc4;
  --text-dim:    rgba(232,223,196,.55);
  --text-faint:  rgba(232,223,196,.28);
  --border:      rgba(201,168,76,.18);
  --hh:          78px;
  --sbw:         232px;
  --cw:          286px;
}

html { scroll-behavior: smooth; }

body {
  font-family: "PingFang SC","Microsoft YaHei","Helvetica Neue",sans-serif;
  background: var(--bg);
  background-image:
    radial-gradient(ellipse 140% 70% at 50% -5%, #243c22 0%, transparent 55%),
    radial-gradient(ellipse 70% 50% at 90% 110%, #0c170c 0%, transparent 50%);
  color: var(--text);
  min-height: 100vh;
}

::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--gold-dim); border-radius: 2px; }

/* ════════════ HEADER ════════════ */
header {
  position: fixed; top: 0; left: 0; right: 0;
  height: var(--hh); z-index: 200;
  background: rgba(5,10,5,.98);
  backdrop-filter: blur(28px);
  border-bottom: none;
}
/* 顶部金色光带 */
header::before {
  content: "";
  position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, transparent 0%, var(--gold-dim) 15%, var(--gold) 50%, var(--gold-dim) 85%, transparent 100%);
}
.hd-inner {
  height: var(--hh);
  display: flex; align-items: center;
  padding: 0 36px;
}

/* LOGO 区域 */
.hd-logo { display: flex; align-items: center; gap: 0; flex-shrink: 0; }
.hd-emblem {
  width: 44px; height: 44px; border-radius: 50%;
  border: 1px solid var(--gold-dim);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 800; color: var(--gold);
  letter-spacing: 1px; flex-shrink: 0;
  background: radial-gradient(circle, rgba(201,168,76,.1) 0%, transparent 70%);
  box-shadow: 0 0 12px rgba(201,168,76,.15), inset 0 0 12px rgba(201,168,76,.05);
  font-family: "Georgia", serif;
}
.hd-logo-vline {
  width: 1px; height: 34px; margin: 0 20px; flex-shrink: 0;
  background: linear-gradient(180deg, transparent, var(--gold-dim) 40%, var(--gold-dim) 60%, transparent);
}
.hd-logo-txt { display: flex; flex-direction: column; justify-content: center; gap: 4px; }
.hd-logo-txt h1 {
  font-size: 16px; font-weight: 700; color: var(--gold);
  letter-spacing: 8px; line-height: 1;
  font-family: "Georgia","STSong",serif;
}
.hd-logo-txt p {
  font-size: 7.5px; color: var(--text-faint);
  letter-spacing: 5px; text-transform: uppercase;
}

/* 中间装饰纹 */
.hd-sep { flex: 1; }
.hd-ornament {
  font-size: 11px; color: var(--gold-dim);
  letter-spacing: 4px; user-select: none; flex-shrink: 0;
  opacity: .7;
}

/* 导航链接 */
.hd-nav { display: flex; gap: 30px; margin-left: 36px; margin-right: 30px; }
.hd-nav a {
  font-size: 9px; letter-spacing: 3.5px; text-transform: uppercase;
  color: var(--text-dim); text-decoration: none; transition: color .2s;
  position: relative; padding-bottom: 2px;
}
.hd-nav a::after {
  content: ""; position: absolute; bottom: 0; left: 50%; right: 50%;
  height: 1px; background: var(--gold);
  transition: left .25s, right .25s;
}
.hd-nav a:hover { color: var(--gold); }
.hd-nav a:hover::after { left: 0; right: 0; }

/* 购物车按钮 */
.hd-cart-btn {
  display: flex; align-items: center; gap: 8px;
  background: none; border: 1px solid var(--gold-dim);
  color: var(--text-dim); cursor: pointer; padding: 9px 20px;
  font-size: 9px; letter-spacing: 3px; text-transform: uppercase;
  transition: all .25s; font-family: inherit; flex-shrink: 0;
}
.hd-cart-btn:hover { border-color: var(--gold); color: var(--gold); background: var(--gold-faint); }
.hd-cart-count {
  background: var(--gold); color: #050a05;
  border-radius: 50%; width: 16px; height: 16px;
  font-size: 9px; font-weight: 800;
  display: flex; align-items: center; justify-content: center;
}
/* 底部金线 */
.hd-bar {
  position: absolute; bottom: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg,transparent 0%,rgba(201,168,76,.15) 20%,rgba(201,168,76,.25) 50%,rgba(201,168,76,.15) 80%,transparent 100%);
}

/* ════════════ SIDEBAR ════════════ */
aside {
  position: fixed; top: var(--hh); left: 0;
  width: var(--sbw); height: calc(100vh - var(--hh));
  overflow-y: auto; overflow-x: hidden;
  background: var(--bg-deep);
  border-right: 1px solid var(--border);
  z-index: 100;
}
.sb-top {
  padding: 22px 20px 16px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 6px;
}
.sb-top-label { font-size: 8.5px; letter-spacing: 4px; text-transform: uppercase; color: var(--text-faint); }

.sb-group { }
.sb-ghd {
  display: flex; align-items: center; justify-content: space-between;
  padding: 13px 20px; cursor: pointer; user-select: none;
  font-size: 9.5px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase;
  color: var(--gold-dim); transition: color .15s;
}
.sb-ghd:hover, .sb-ghd.open { color: var(--gold); }
.sb-arrow { font-size: 12px; transition: transform .28s ease; display: inline-block; }
.sb-ghd.open .sb-arrow { transform: rotate(90deg); }

.sb-items { max-height: 0; overflow: hidden; transition: max-height .38s ease; }
.sb-items.open { max-height: 700px; }

.sb-item {
  display: block; width: 100%; background: none; border: none;
  text-align: left; padding: 9px 20px 9px 32px;
  font-size: 13px; color: var(--text-dim); cursor: pointer;
  position: relative; transition: color .15s, background .15s;
  font-family: inherit;
}
.sb-item::before {
  content: ""; position: absolute; left: 20px; top: 50%;
  transform: translateY(-50%);
  width: 4px; height: 4px; border-radius: 50%;
  background: rgba(201,168,76,.3); transition: background .15s;
}
.sb-item:hover { color: var(--text); background: var(--gold-faint); }
.sb-item:hover::before { background: var(--gold-dim); }
.sb-item.active { color: var(--gold); background: var(--gold-faint); }
.sb-item.active::before { background: var(--gold); }

.sb-div {
  height: 1px; margin: 6px 16px;
  background: linear-gradient(90deg,transparent,var(--border),transparent);
}

/* ════════════ MAIN ════════════ */
main {
  margin-left: var(--sbw);
  margin-right: var(--cw);
  margin-top: var(--hh);
  padding: 50px 44px 70px;
  min-height: calc(100vh - var(--hh));
}

/* welcome */
.welcome-sec {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; min-height: 55vh; text-align: center; gap: 14px;
}
.wl-eye { font-size: 9px; letter-spacing: 5px; text-transform: uppercase; color: var(--gold-dim); }
.wl-title { font-size: 32px; font-weight: 300; color: var(--text); letter-spacing: 3px; font-family: "Georgia","STSong",serif; }
.wl-line { width: 1px; height: 56px; background: linear-gradient(var(--gold-dim),transparent); margin: 4px auto; }
.wl-desc { font-size: 13px; color: var(--text-faint); letter-spacing: 1.5px; max-width: 380px; line-height: 1.8; }

/* section header */
.sec-hd { margin-bottom: 32px; padding-bottom: 18px; border-bottom: 1px solid var(--border); position: relative; }
.sec-hd::after { content:""; position:absolute; bottom:-1px; left:0; width:52px; height:1px; background:var(--gold); }
.sec-crumb { font-size: 9px; letter-spacing: 3.5px; text-transform: uppercase; color: var(--text-faint); margin-bottom: 8px; }
.sec-title { font-size: 24px; font-weight: 300; color: var(--text); letter-spacing: 1.5px; font-family: "Georgia","STSong",serif; }
.sec-title em { font-style: normal; color: var(--gold); font-weight: 700; }
.sec-desc { font-size: 12.5px; color: var(--text-faint); margin-top: 5px; letter-spacing: .5px; }

/* product section visibility */
.prod-section { display: none; }
.prod-section.active { display: block; }

/* ── PRODUCT GRID ── */
.prod-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 18px;
}

/* ── CARD ── */
.p-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  overflow: hidden;
  cursor: pointer;
  position: relative;
  transition: transform .28s, border-color .28s, box-shadow .28s;
}
/* top accent line */
.p-card::before {
  content:""; position:absolute; top:0; left:0; right:0; height:1px;
  background: linear-gradient(90deg,transparent,var(--gold-dim),transparent);
  transition: background .28s;
}
.p-card:hover {
  transform: translateY(-5px);
  border-color: var(--gold-dim);
  box-shadow: 0 14px 44px rgba(0,0,0,.45), 0 0 24px rgba(201,168,76,.05);
}
.p-card:hover::before { background: linear-gradient(90deg,transparent,var(--gold),transparent); }

.p-img {
  aspect-ratio: 1;
  background: linear-gradient(155deg,#1b2e19 0%,#0c1c0c 100%);
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 7px; position: relative; overflow: hidden;
}
.p-glow {
  position: absolute; width: 110px; height: 110px; border-radius: 50%;
  background: radial-gradient(circle,rgba(201,168,76,.09) 0%,transparent 70%);
  top:50%; left:50%; transform:translate(-50%,-50%);
  transition: transform .35s;
}
.p-card:hover .p-glow { transform: translate(-50%,-50%) scale(1.6); }
.p-icon { font-size: 38px; position:relative; z-index:1; }
.p-img-lbl { font-size: 8.5px; letter-spacing:3px; text-transform:uppercase; color:var(--text-faint); position:relative;z-index:1; }
.p-badge {
  position:absolute; top:10px; right:10px; z-index:2;
  background: rgba(201,168,76,.1); border: 1px solid var(--gold-dim);
  color:var(--gold); font-size:8.5px; letter-spacing:2px; padding:3px 8px; text-transform:uppercase;
}

.p-body { padding: 13px 15px 15px; }
.p-cat { font-size: 8.5px; letter-spacing: 3px; text-transform: uppercase; color: var(--text-faint); margin-bottom: 5px; }
.p-name {
  font-size: 14.5px; font-weight: 600; color: var(--gold); margin-bottom: 2px;
  font-family: "Georgia","STSong",serif; line-height: 1.3;
}
.p-latin { font-size: 9.5px; color: var(--gold-dim); font-style: italic; margin-bottom: 9px; }
.p-hr { height:1px; background:linear-gradient(90deg,var(--border),transparent); margin-bottom:9px; }
.p-tags { display:flex; gap:4px; flex-wrap:wrap; margin-bottom:11px; }
.p-tag {
  border:1px solid rgba(201,168,76,.2); color:var(--text-faint);
  font-size:8.5px; letter-spacing:1px; padding:2px 7px; text-transform:uppercase;
}
.p-foot { display:flex; align-items:center; justify-content:space-between; }
.p-price { font-size:16px; font-weight:300; color:var(--text); letter-spacing:.5px; }
.p-price sup { font-size:10px; color:var(--text-dim); }
.p-price span { font-size:10px; color:var(--text-faint); }
.p-btn {
  background:transparent; border:1px solid var(--gold-dim);
  color:var(--gold-dim); font-size:9.5px; letter-spacing:2px; padding:6px 11px;
  cursor:pointer; text-transform:uppercase; transition:all .2s; font-family:inherit;
}
.p-btn:hover { border-color:var(--gold); color:var(--gold); background:var(--gold-faint); }

/* ── SIZE SELECTOR ── */
.sz-btns { display:flex; gap:4px; margin-bottom:9px; }
.sz-btn {
  flex:1; background:transparent; border:1px solid var(--border);
  color:var(--text-faint); font-size:9px; letter-spacing:1px;
  padding:5px 2px; cursor:pointer; transition:all .15s; font-family:inherit; text-align:center;
}
.sz-btn:hover { border-color:var(--gold-dim); color:var(--text-dim); }
.sz-btn.active { border-color:var(--gold); color:var(--gold); background:var(--gold-faint); }
.p-spec { font-size:9.5px; color:var(--text-faint); margin-bottom:8px; min-height:14px; letter-spacing:.3px; }

/* ════════════ CART PANEL ════════════ */
.cart-panel {
  position: fixed; top: var(--hh); right: 0;
  width: var(--cw); height: calc(100vh - var(--hh));
  background: var(--bg-deep);
  border-left: 1px solid var(--border);
  z-index: 100;
  display: flex; flex-direction: column;
}

.cp-head {
  padding: 18px 20px 14px; border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.cp-hd-row { display:flex; align-items:center; justify-content:space-between; }
.cp-title { font-size: 9.5px; letter-spacing: 4px; text-transform: uppercase; color: var(--gold); font-weight: 700; }
.cp-clear-btn {
  background:none; border:1px solid var(--border); color:var(--text-faint);
  font-size:9px; letter-spacing:1px; padding:3px 9px; cursor:pointer; transition:all .15s; font-family:inherit;
}
.cp-clear-btn:hover { border-color:var(--gold-dim); color:var(--gold-dim); }
.cp-sub { font-size:10px; color:var(--text-faint); margin-top:4px; letter-spacing:1px; }

.cp-items { flex:1; overflow-y:auto; overflow-x:hidden; }
.cp-empty {
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  height:100%; gap:12px; padding:24px; text-align:center;
  color:var(--text-faint);
}
.cp-empty-icon { font-size:34px; opacity:.3; }
.cp-empty-txt { font-size:12px; letter-spacing:.5px; line-height:1.8; }

.cp-item {
  display:flex; align-items:flex-start; gap:10px;
  padding:12px 18px; border-bottom:1px solid rgba(201,168,76,.07);
}
.cp-item-icon { font-size:18px; flex-shrink:0; padding-top:2px; }
.cp-item-info { flex:1; min-width:0; }
.cp-item-name { font-size:12.5px; color:var(--gold); font-weight:600; margin-bottom:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.cp-item-uprice { font-size:10px; color:var(--text-faint); }
.cp-qty { display:flex; align-items:center; gap:5px; flex-shrink:0; }
.cp-qbtn {
  width:19px; height:19px; border:1px solid var(--border); background:none;
  color:var(--gold-dim); font-size:13px; cursor:pointer;
  display:flex; align-items:center; justify-content:center; transition:all .15s;
}
.cp-qbtn:hover { border-color:var(--gold); color:var(--gold); }
.cp-qnum { font-size:12.5px; color:var(--text); min-width:14px; text-align:center; }
.cp-sub-price { font-size:11px; color:var(--text-dim); min-width:44px; text-align:right; flex-shrink:0; }

.cp-summary { flex-shrink:0; padding:14px 20px; border-top:1px solid var(--border); }
.cp-srow { display:flex; justify-content:space-between; font-size:10.5px; color:var(--text-faint); margin-bottom:5px; }
.cp-total-row { display:flex; justify-content:space-between; align-items:baseline; padding-top:10px; margin-top:8px; border-top:1px solid var(--border); }
.cp-total-lbl { font-size:9px; letter-spacing:3px; text-transform:uppercase; color:var(--text-dim); }
.cp-total-val { font-size:21px; font-weight:300; color:var(--gold); }
.cp-total-val sup { font-size:12px; }
.cp-checkout {
  display:block; width:100%; margin-top:13px;
  background:transparent; border:1px solid var(--gold); color:var(--gold);
  font-size:10px; letter-spacing:3px; text-transform:uppercase; padding:12px;
  cursor:pointer; position:relative; overflow:hidden; transition:color .25s; font-family:inherit;
}
.cp-checkout::before {
  content:""; position:absolute; inset:0; background:var(--gold);
  transform:scaleX(0); transform-origin:left; transition:transform .28s;
}
.cp-checkout:hover { color:var(--bg-deep); }
.cp-checkout:hover::before { transform:scaleX(1); }
.cp-checkout span { position:relative; z-index:1; }

/* ════════════ CART CONTACT FORM ════════════ */
.cp-contact {
  flex-shrink:0; padding:16px 20px 20px;
  border-top:1px solid var(--border);
}
.cp-contact-title {
  font-size:11px; color:var(--text-dim); line-height:1.8;
  margin-bottom:13px; letter-spacing:.5px;
}
.cp-input {
  display:block; width:100%;
  background:var(--bg-card); border:1px solid var(--border);
  color:var(--text); font-size:13px; padding:9px 12px; outline:none;
  transition:border-color .2s; font-family:inherit; margin-bottom:8px;
}
.cp-input::placeholder { color:var(--text-faint); }
.cp-input:focus { border-color:var(--gold-dim); }
.cp-submit-btn {
  display:block; width:100%;
  background:transparent; border:1px solid var(--gold); color:var(--gold);
  font-size:10.5px; letter-spacing:2px; padding:11px 6px;
  cursor:pointer; position:relative; overflow:hidden;
  transition:color .25s; font-family:inherit; text-align:center;
}
.cp-submit-btn::before {
  content:""; position:absolute; inset:0; background:var(--gold);
  transform:scaleX(0); transform-origin:left; transition:transform .28s;
}
.cp-submit-btn:hover { color:var(--bg-deep); }
.cp-submit-btn:hover::before { transform:scaleX(1); }
.cp-submit-btn span { position:relative; z-index:1; }
.cp-contact-success {
  font-size:12px; color:var(--gold); text-align:center;
  line-height:1.8; padding:10px 0; letter-spacing:.5px;
}

/* page footer */
.pg-footer {
  margin-top:72px; padding:24px 0; border-top:1px solid var(--border);
  text-align:center; font-size:9.5px; letter-spacing:3px; text-transform:uppercase; color:var(--text-faint);
}
.pg-footer em { font-style:normal; color:var(--gold-dim); }

/* toast */
#toast {
  position:fixed; bottom:26px; left:50%;
  transform:translateX(-50%) translateY(8px);
  background:rgba(10,18,10,.95); border:1px solid var(--gold-dim);
  color:var(--text); padding:10px 20px; font-size:13px; letter-spacing:.5px;
  opacity:0; pointer-events:none; transition:all .3s; z-index:999;
}
#toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- ═══════════════ HEADER ═══════════════ -->
<header>
  <div class="hd-inner">
    <div class="hd-logo">
      <div class="hd-emblem">YJG</div>
      <div class="hd-logo-vline"></div>
      <div class="hd-logo-txt">
        <h1>YJG 花 园</h1>
        <p>Beijing · Garden · Design</p>
      </div>
    </div>
    <div class="hd-sep"></div>
    <div class="hd-ornament">── ✦ ──</div>
    <nav class="hd-nav">
      <a href="#order-anchor">设计服务</a>
      <a href="#order-anchor">关于我们</a>
      <a href="#order-anchor">联系我们</a>
    </nav>
    <button class="hd-cart-btn" onclick="scrollToOrder()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
        <line x1="3" y1="6" x2="21" y2="6"/>
        <path d="M16 10a4 4 0 01-8 0"/>
      </svg>
      购物车
      <span class="hd-cart-count" id="hd-cart-count">0</span>
    </button>
  </div>
  <div class="hd-bar"></div>
</header>

<!-- ═══════════════ SIDEBAR ═══════════════ -->
<aside id="sidebar">
  <div class="sb-top">
    <div class="sb-top-label">植物分类导航</div>
  </div>
  <div id="sb-nav"></div>
</aside>

<!-- ═══════════════ MAIN ═══════════════ -->
<main id="main-area">

  <div id="sec-welcome" class="welcome-sec">
    <div class="wl-eye">YJG Garden · Beijing</div>
    <div class="wl-title">北京顶级花园植物定制</div>
    <div class="wl-line"></div>
    <div class="wl-desc">请从左侧分类导航选择植物品类<br>浏览精选品种，构建您的理想花园</div>
  </div>

  <div id="prod-container"></div>

  <div class="pg-footer">
    <em>YJG 花园</em> · 北京顶级花园植物定制 · 专业园艺设计与施工 · 10年品质保障
  </div>
</main>

<!-- ═══════════════ CART PANEL ═══════════════ -->
<div class="cart-panel" id="cart-panel">
  <div class="cp-head">
    <div class="cp-hd-row">
      <div class="cp-title">Selected Plants</div>
      <button class="cp-clear-btn" onclick="clearCart()">清空</button>
    </div>
    <div class="cp-sub">您的植物清单</div>
  </div>
  <div class="cp-items" id="cp-items">
    <div class="cp-empty">
      <div class="cp-empty-icon">🌱</div>
      <div class="cp-empty-txt">尚未选购植物<br>从左侧分类中挑选您的品种</div>
    </div>

function buildRealCard(plant, catId, idx) {
  const cid = `card-${catId}-r${idx}`;
  cardState[cid] = { price: plant.sizes[0].price, spec: plant.sizes[0].spec };
  const tagsHtml = plant.tags.map(t => `<span class="p-tag">${t}</span>`).join('');
  const sizeBtns = plant.sizes.map((s, i) =>
    `<button class="sz-btn${i===0?' active':''}" onclick="selectSize('${cid}',${s.price},'${s.spec}',this)">${s.label}</button>`
  ).join('');
  return `
    <div class="p-card" id="${cid}">
      <div class="p-img">
        <div class="p-glow"></div>
        <div class="p-icon">${plant.icon}</div>
        <div class="p-img-lbl">Plant Image</div>
        <div class="p-badge">${plant.badge}</div>
      </div>
      <div class="p-body">
        <div class="p-cat">热门乔木</div>
        <div class="p-name">${plant.name}</div>
        <div class="p-latin">${plant.latin}</div>
        <div class="p-hr"></div>
        <div class="p-tags">${tagsHtml}</div>
        <div class="sz-btns">${sizeBtns}</div>
        <div class="p-spec" id="${cid}-spec">${plant.sizes[0].spec}</div>
        <div class="p-foot">
          <div class="p-price"><sup>¥</sup><span id="${cid}-price">${plant.sizes[0].price.toLocaleString()}</span><span>/株</span></div>
          <button class="p-btn" onclick="addToCartByState('${cid}','${plant.name}','${plant.icon}')">+ 加入</button>
        </div>
      </div>
    </div>`;
}

function selectSize(cardId, price, spec, btn) {
  cardState[cardId] = { price, spec };
  btn.parentElement.querySelectorAll('.sz-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById(cardId + '-price').textContent = price.toLocaleString();
  document.getElementById(cardId + '-spec').textContent = spec;
}

function addToCartByState(cardId, name, icon) {
  const state = cardState[cardId];
  if (!state) return;
  const activeBtn = document.querySelector(`#${cardId} .sz-btn.active`);
  const sizeLabel = activeBtn ? activeBtn.textContent.trim() : '';
  const key = `${cardId}|${sizeLabel}`;
  addToCart(key, `${name}（${sizeLabel}）`, icon, state.price);
}

function buildSimpleCard(plant, catId, idx) {
  const cid = `card-${catId}-r${idx}`;
  const tagsHtml = (plant.tags || []).map(t => `<span class="p-tag">${t}</span>`).join('');
  return `
    <div class="p-card" id="${cid}">
      <div class="p-img">
        <div class="p-glow"></div>
        <div class="p-icon">${plant.icon || '🌿'}</div>
        <div class="p-img-lbl">Plant Image</div>
        ${plant.badge ? `<div class="p-badge">${plant.badge}</div>` : ''}
      </div>
      <div class="p-body">
        <div class="p-name" style="margin-top:4px">${plant.name}</div>
        <div class="p-latin">${plant.latin || ''}</div>
        <div class="p-hr"></div>
        ${tagsHtml ? `<div class="p-tags">${tagsHtml}</div>` : ''}
        <div class="p-foot">
          <div class="p-price" style="font-size:12px;color:var(--text-faint);letter-spacing:1.5px">价格待定</div>
          <button class="p-btn" onclick="scrollToOrder()">咨询报价</button>
        </div>
      </div>
    </div>`;
}

// ─── BUILD SIDEBAR ───
function buildNav() {
  const nav = document.getElementById('sb-nav');
  let html = '';
  GROUPS.forEach((g, gi) => {
    html += `
      <div class="sb-group">
        <div class="sb-ghd ${gi===0?'open':''}" onclick="toggleGroup('${g.id}',this)">
          <span>${g.name}</span>
          <span class="sb-arrow">›</span>
        </div>
        <div class="sb-items ${gi===0?'open':''}" id="sbg-${g.id}">
          ${g.cats.map(c=>`<button class="sb-item" id="sbi-${c.id}" onclick="showSection('${c.id}')">${c.name}</button>`).join('')}
        </div>
      </div>
      <div class="sb-div"></div>
    `;
  });
  nav.innerHTML = html;
}

function toggleGroup(id, el) {
  el.classList.toggle('open');
  const items = document.getElementById(`sbg-${id}`);
  items.classList.toggle('open');
}

// ─── BUILD PRODUCT SECTIONS ───
function buildSections() {
  const container = document.getElementById('prod-container');
  let html = '';
  GROUPS.forEach(g => {
    g.cats.forEach(cat => {
      html += `<div class="prod-section" id="sec-${cat.id}">
        <div class="sec-hd">
          <div class="sec-crumb">${g.name} · ${cat.crumb}</div>
          <div class="sec-title"><em>${cat.name}</em></div>
          <div class="sec-desc">${cat.desc}</div>
        </div>
        <div class="prod-grid" id="grid-${cat.id}"></div>
      </div>`;
    });
  });
  container.innerHTML = html;
  // populate cards
  GROUPS.forEach(g => {
    g.cats.forEach(cat => {
      const grid = document.getElementById(`grid-${cat.id}`);
      let cards = '';
      if (REAL_PLANTS[cat.id]) {
        // use real plant data with size selector
        REAL_PLANTS[cat.id].forEach((plant, idx) => {
          cards += plant.sizes ? buildRealCard(plant, cat.id, idx) : buildSimpleCard(plant, cat.id, idx);
        });
      } else {
        // placeholder cards for categories not yet filled
        for (let i = 1; i <= 8; i++) {
          const price = Math.round(cat.priceBase * PRICE_MULT[(i-1)%8] / 10) * 10;
          const unit = cat.priceBase >= 400 ? '/株' : cat.priceBase >= 80 ? '/株' : '/盆';
          const badges = ['精选','热销','推荐','新品','限量','名品','甄选','当季'];
          cards += `
            <div class="p-card" id="card-${cat.id}-${i}">
              <div class="p-img">
                <div class="p-glow"></div>
                <div class="p-icon">${cat.icon}</div>
                <div class="p-img-lbl">Plant Image</div>
                <div class="p-badge">${badges[(i-1)%8]}</div>
              </div>
              <div class="p-body">
                <div class="p-cat">${cat.name}</div>
                <div class="p-name">植物名称 ${i}</div>
                <div class="p-latin">Species name sp. var. ${i}</div>
                <div class="p-hr"></div>
                <div class="p-tags">
                  ${cat.tags.map(t=>`<span class="p-tag">${t}</span>`).join('')}
                </div>
                <div class="p-foot">
                  <div class="p-price"><sup>¥</sup>${price}<span>${unit}</span></div>
                  <button class="p-btn" onclick="addToCart('${cat.id}-${i}','植物名称 ${i}','${cat.icon}',${price})">+ 加入</button>
                </div>
              </div>
            </div>`;
        }
      }
      grid.innerHTML = cards;
    });
  });
}

// ─── SECTION SWITCHING ───
let activeSec = null;
function showSection(id) {
  // hide welcome
  document.getElementById('sec-welcome').style.display = 'none';
  // hide previous
  if (activeSec) document.getElementById(`sec-${activeSec}`)?.classList.remove('active');
  // show new
  document.getElementById(`sec-${id}`)?.classList.add('active');
  activeSec = id;
  // update sidebar
  document.querySelectorAll('.sb-item').forEach(b => b.classList.remove('active'));
  document.getElementById(`sbi-${id}`)?.classList.add('active');
  // scroll top
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ─── CART ───
const cart = {};

function addToCart(id, name, icon, price) {
  if (cart[id]) cart[id].qty++;
  else cart[id] = { name, icon, price, qty: 1 };
  renderCart();
  showToast(`${icon} 「${name}」已加入清单`);
}

function changeQty(id, delta) {
  if (!cart[id]) return;
  cart[id].qty += delta;
  if (cart[id].qty <= 0) delete cart[id];
  renderCart();
}

function clearCart() {
  Object.keys(cart).forEach(k => delete cart[k]);
  renderCart();
}

function renderCart() {
  const keys = Object.keys(cart);
  const total = keys.reduce((s,k)=>s+cart[k].price*cart[k].qty,0);
  const totalQty = keys.reduce((s,k)=>s+cart[k].qty,0);
  document.getElementById('hd-cart-count').textContent = totalQty;

  const itemsEl = document.getElementById('cp-items');
  const sumEl = document.getElementById('cp-summary');

  if (!keys.length) {
    itemsEl.innerHTML = `<div class="cp-empty"><div class="cp-empty-icon">🌱</div><div class="cp-empty-txt">尚未选购植物<br>从左侧分类中挑选您的品种</div></div>`;
    sumEl.style.display = 'none';
    return;
  }

  itemsEl.innerHTML = keys.map(k => {
    const it = cart[k];
    return `<div class="cp-item">
      <div class="cp-item-icon">${it.icon}</div>
      <div class="cp-item-info">
        <div class="cp-item-name">${it.name}</div>
        <div class="cp-item-uprice">¥${it.price} / 株</div>
      </div>
      <div class="cp-qty">
        <button class="cp-qbtn" onclick="changeQty('${k}',-1)">−</button>
        <span class="cp-qnum">${it.qty}</span>
        <button class="cp-qbtn" onclick="changeQty('${k}',1)">+</button>
      </div>
      <div class="cp-sub-price">¥${it.price*it.qty}</div>
    </div>`;
  }).join('');

  document.getElementById('cp-count').textContent = totalQty + '件';
  document.getElementById('cp-total').textContent = total.toLocaleString();
  sumEl.style.display = 'block';
}

// ─── UTILS ───
let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2400);
}

function scrollToOrder() { focusContact(); }

function focusContact() {
  document.getElementById('cp-name')?.focus();
}

function submitContact() {
  const name  = document.getElementById('cp-name').value.trim();
  const phone = document.getElementById('cp-phone').value.trim();
  if (!name)  { showToast('⚠ 请填写您的姓名'); document.getElementById('cp-name').focus(); return; }
  if (!phone) { showToast('⚠ 请填写手机号码'); document.getElementById('cp-phone').focus(); return; }
  document.getElementById('cp-contact-form').style.display = 'none';
  document.getElementById('cp-contact-success').style.display = 'block';
  showToast('✓ 选单已提交，30分钟内联系您');
}

// ─── INIT ───
buildNav();
buildSections();
// default: open first group, select first cat
showSection(GROUPS[0].cats[0].id);
</script>
</body>
</html>
